<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concrete Kingdom — Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #ccc; font-family: monospace; display: flex; height: 100vh; }
#sidebar { width: 280px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; padding: 8px; flex-shrink: 0; }
#sidebar h3 { color: #ffaa44; padding: 4px 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
#sidebar .file { padding: 3px 8px 3px 16px; cursor: pointer; font-size: 12px; color: #999; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#sidebar .file:hover { background: #2a2a2a; color: #fff; }
#sidebar .file.active { background: #ffaa4422; color: #ffaa44; }
#main { flex: 1; display: flex; flex-direction: column; }
#toolbar { background: #1a1a1a; border-bottom: 1px solid #333; padding: 6px 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
#toolbar button { background: #333; border: 1px solid #555; color: #ccc; padding: 4px 12px; border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 12px; }
#toolbar button:hover { background: #444; }
#toolbar #filename { color: #ffaa44; font-size: 12px; flex: 1; }
#toolbar #save-btn { background: #ffaa44; color: #111; font-weight: bold; }
#toolbar #save-btn:hover { background: #ffbb55; }
#toolbar #status { font-size: 11px; color: #666; }
#editor-wrap { flex: 1; display: flex; }
#editor-wrap textarea { flex: 1; background: #0d0d0d; color: #e0e0e0; border: none; padding: 12px; font-family: 'Consolas','Monaco','Courier New',monospace; font-size: 13px; line-height: 1.5; resize: none; outline: none; tab-size: 2; }
#login { display: flex; align-items: center; justify-content: center; height: 100vh; background: #111; }
#login form { background: #1a1a1a; border: 1px solid #333; padding: 24px; border-radius: 6px; }
#login input { background: #222; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 3px; font-family: monospace; width: 200px; }
#login button { background: #ffaa44; color: #111; border: none; padding: 8px 16px; border-radius: 3px; cursor: pointer; font-family: monospace; margin-left: 8px; font-weight: bold; }
#login .error { color: #ff4444; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div id="login">
  <form id="login-form">
    <input type="password" id="token-input" placeholder="editor token" autofocus>
    <button type="submit">Enter</button>
    <div class="error" id="login-error"></div>
  </form>
</div>

<div id="app" style="display:none;width:100%">
  <div id="sidebar">
    <h3>Game Files</h3>
    <div id="file-tree"></div>
  </div>
  <div id="main">
    <div id="toolbar">
      <span id="filename">Select a file</span>
      <span id="status"></span>
      <button id="reload-btn">Reload</button>
      <button id="save-btn">Save</button>
    </div>
    <div id="editor-wrap">
      <textarea id="editor" spellcheck="false" placeholder="Select a file to edit..."></textarea>
    </div>
  </div>
</div>

<script>
let TOKEN = '';
let currentFile = '';

async function api(path, opts = {}) {
  const url = '/api/editor' + path + (path.includes('?') ? '&' : '?') + 'token=' + TOKEN;
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(await res.text());
  return res;
}

async function loadFileTree() {
  const res = await api('/files?dir=.');
  const files = await res.json();
  const tree = document.getElementById('file-tree');
  tree.innerHTML = '';
  // Sort: dirs first, then files
  const sorted = files.sort((a, b) => {
    const aDir = !path.extname(a);
    const bDir = !path.extname(b);
    if (aDir && !bDir) return -1;
    if (!aDir && bDir) return 1;
    return a.localeCompare(b);
  });
  for (const f of sorted) {
    const el = document.createElement('div');
    el.className = 'file';
    el.textContent = f;
    el.onclick = () => openFile(f, el);
    tree.appendChild(el);
  }
}

async function openFile(file, el) {
  currentFile = file;
  document.querySelectorAll('.file').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('filename').textContent = file;
  document.getElementById('status').textContent = 'loading...';
  try {
    const res = await api('/read?file=' + encodeURIComponent(file));
    const text = await res.text();
    document.getElementById('editor').value = text;
    document.getElementById('status').textContent = 'loaded';
  } catch (e) {
    document.getElementById('status').textContent = 'error: ' + e.message;
  }
}

async function saveFile() {
  if (!currentFile) return;
  const content = document.getElementById('editor').value;
  document.getElementById('status').textContent = 'saving...';
  try {
    await api('/write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: currentFile, content }),
    });
    document.getElementById('status').textContent = 'saved ✓';
    setTimeout(() => document.getElementById('status').textContent = '', 2000);
  } catch (e) {
    document.getElementById('status').textContent = 'error: ' + e.message;
  }
}

const path = {
  extname(p) { const i = p.lastIndexOf('.'); return i >= 0 ? p.slice(i) : ''; }
};

document.getElementById('login-form').onsubmit = async (e) => {
  e.preventDefault();
  TOKEN = document.getElementById('token-input').value;
  try {
    await loadFileTree();
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  } catch (err) {
    document.getElementById('login-error').textContent = 'Invalid token';
  }
};

document.getElementById('reload-btn').onclick = loadFileTree;
document.getElementById('save-btn').onclick = saveFile;

// Ctrl+S to save
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveFile();
  }
});
</script>
</body>
</html>
